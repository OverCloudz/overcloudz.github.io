<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body { margin:0; background:black; height:100%; }
#player { width:100vw; height:100vh; border:0; }
</style>
</head>
<body>

<iframe id="player"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

<script>
var clips = [
  { id:"SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb", dur: 18 },
  { id:"DirtyObliviousDuckBCWarrior-KWxj1eno45HmOoIA", dur: 22 }
];

var i = 0;
var player = document.getElementById("player");

function loadClip(index){
  player.src =
    "https://clips.twitch.tv/embed?clip=" + clips[index].id +
    "&parent=overcloudz.github.io&autoplay=true&muted=true";

  setTimeout(function(){
    i = (i + 1) % clips.length;
    loadClip(i);
  }, clips[index].dur * 1000);
}

loadClip(i);
</script>

</body>
</html>
