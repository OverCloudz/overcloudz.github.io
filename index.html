<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
const clips = [ /* your full clips list here */ ];

let index = 0;
let player;

function playNextClip() {
  if (index >= clips.length) index = 0;

  player = new Twitch.Player("player", {
    parent: ["overcloudz.github.io"],
    width: "100%",
    height: "100%",
    clip: clips[index],
    autoplay: true
  });

  player.addEventListener(Twitch.Player.READY, () => {
    player.play();
  });

  player.addEventListener(Twitch.Player.ENDED, () => {
    index++;
    player.setClip(clips[index]);
    player.play();
  });

  player.addEventListener(Twitch.Player.ERROR, () => {
    index++;               // skip broken clip
    player.setClip(clips[index]);
    player.play();
  });
}

playNextClip();
</script>
