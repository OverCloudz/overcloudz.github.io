<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  margin: 0;
  background: black;
}
#player {
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>

<div id="player"></div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
const clips = [
  "SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb",
  "DirtyObliviousDuckBCWarrior-KWxj1eno45HmOoIA"
];

let index = 0;

const player = new Twitch.Player("player", {
  width: "100%",
  height: "100%",
  clip: clips[index],
  parent: ["overcloudz.github.io"],
  autoplay: true,
  muted: false
});

player.addEventListener(Twitch.Player.ENDED, () => {
  index = (index + 1) % clips.length;
  player.setClip(clips[index]);
});
</script>

</body>
</html>
