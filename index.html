<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  margin: 0;
  background: black;
}
.player {
  width: 100vw;
  height: 100vh;
  border: 0;
}
</style>
</head>
<body>

<iframe
  class="player"
  src="https://clips.twitch.tv/embed?clip=SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb&parent=overcloudz.github.io&autoplay=true&muted=true"
  allow="autoplay; fullscreen"
  allowfullscreen>
</iframe>

<script>
const clips = [
  "https://clips.twitch.tv/embed?clip=SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb&parent=overcloudz.github.io&autoplay=true&muted=true",
  "https://clips.twitch.tv/embed?clip=DirtyObliviousDuckBCWarrior-KWxj1eno45HmOoIA&parent=overcloudz.github.io&autoplay=true&muted=true"
];

let i = 0;
const player = document.querySelector(".player");

setInterval(() => {
  i = (i + 1) % clips.length;
  player.src = clips[i];
}, 30000); // change clip every 30s
</script>

</body>
</html>
