<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Twitch Clips Player</title>
<style>
html, body {
  margin: 0;
  background: black;
  height: 100%;
  overflow: hidden;
}
#player {
  width: 100vw;
  height: 100vh;
}
</style>
</head>

<body>
<div id="player"></div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
const clips = [
"DirtyObliviousDuckBCWarrior-KWXj1eno45HmOoIA"
];

function randomClip() {
  return clips[Math.floor(Math.random() * clips.length)];
}

const player = new Twitch.Player("player", {
  width: "100%",
  height: "100%",
  clip: randomClip(),
  autoplay: true,
  muted: true,
  parent: [
    "overcloudz.github.io",
    "overcloudz.github.io/"
  ]
});
</script>
</body>
</html>
