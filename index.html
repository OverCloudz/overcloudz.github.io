<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body { margin:0; background:black; }
#player { width:100vw; height:100vh; }
</style>
</head>
<body>

<div id="player"></div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
var clips = [
"SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb",
"DirtyObliviousDuckBCWarrior-KWxj1eno45HmOoIA"
];

var i = 0;

var player = new Twitch.Player("player", {
  width: "100%",
  height: "100%",
  clip: clips[i],
  parent: ["overcloudz.github.io"],
  autoplay: true,
  muted: true
});

player.addEventListener(Twitch.Player.READY, function() {
  player.addEventListener("ended", function () {
    i = (i + 1) % clips.length;
    player.setClip(clips[i]);
  });
});
</script>

</body>
</html>
