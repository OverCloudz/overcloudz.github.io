<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body { margin:0; background:black; height:100%; }
#player { width:100vw; height:100vh; border:0; }
</style>
</head>
<body>

<iframe id="player"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

<script>
var clips = [
"SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb",
"DirtyObliviousDuckBCWarrior-KWxj1eno45HmOoIA"
];

var i = 0;
var player = document.getElementById("player");

function loadClip(index){
  player.src =
    "https://clips.twitch.tv/embed?clip=" + clips[index] +
    "&parent=overcloudz.github.io&autoplay=true&muted=true";
}

loadClip(i);

// Detect when iframe finishes by time fallback
var CHECK_INTERVAL = 1000;
var lastTime = 0;

setInterval(function(){
  try {
    var t = player.contentWindow.document.querySelector("video");
    if (!t) return;

    if (t.currentTime < lastTime) {
      i = (i + 1) % clips.length;
      loadClip(i);
    }
    lastTime = t.currentTime;
  } catch(e){}
}, CHECK_INTERVAL);
</script>

</body>
</html>
