<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  margin: 0;
  background: black;
  height: 100%;
}
.player {
  width: 100%;
  height: 100vh;
  border: 0;
}
</style>
</head>
<body>

<iframe id="player" class="player"
src="https://clips.twitch.tv/embed?clip=SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb&parent=overcloudz.github.io&autoplay=true&muted=true"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

<script>
const clips = [
  "https://clips.twitch.tv/embed?clip=SpicyNiceCaribouCoolStoryBro-HBc3up7J6LHWkxwb&parent=overcloudz.github.io&autoplay=true&muted=true",
  "https://clips.twitch.tv/embed?clip=DirtyObliviousDuckBCWarrior-KWxj1eno45HmO0IA&parent=overcloudz.github.io&autoplay=true&muted=true"
];

let i = 0;
const player = document.getElementById("player");

// switch clip every 30 seconds (most Twitch clips are shorter)
setInterval(() => {
  i = (i + 1) % clips.length;
  player.src = clips[i];
}, 30000);
</script>

</body>
</html>
